<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Job Copilot{% endblock %}</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 15px/1.55 system-ui, sans-serif; margin: 0; background: #f6f6f4; color: #1d1d1f; }
  @media (prefers-color-scheme: dark) { body { background: #161618; color: #e8e8ea; } .card, input, textarea { background: #1f1f23 !important; color: inherit; border-color: #3a3a40 !important; } .muted { color: #9a9aa2 !important; } }
  header { padding: 14px 22px; border-bottom: 1px solid #8884; display: flex; gap: 18px; align-items: baseline; }
  header a { color: inherit; text-decoration: none; font-weight: 600; }
  header .nav a { font-weight: 400; opacity: .75; margin-right: 14px; }
  main { max-width: 780px; margin: 26px auto; padding: 0 18px; }
  .card { background: #fff; border: 1px solid #e2e2de; border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  h1 { font-size: 20px; margin: 0 0 14px; } h2 { font-size: 15px; margin: 0 0 8px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
  input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 7px; font: inherit; }
  textarea { min-height: 84px; }
  button { margin-top: 14px; padding: 9px 18px; border: 0; border-radius: 8px; background: #2b6cb0; color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
  button.secondary { background: #6b7280; } button.approve { background: #2f855a; }
  .muted { color: #666; font-size: 13px; }
  .chip { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; background: #e2e8f0; color: #234; margin-right: 6px; }
  .chip.warn { background: #fef3c7; color: #92400e; } .chip.ok { background: #d1fae5; color: #065f46; }
  .banner { padding: 10px 14px; border-radius: 8px; background: #fef3c7; color: #92400e; font-size: 13px; margin-bottom: 14px; }
  ul { margin: 6px 0; padding-left: 20px; } li { margin: 2px 0; }
  table { width: 100%; border-collapse: collapse; } td, th { text-align: left; padding: 7px 6px; border-bottom: 1px solid #8882; font-size: 14px; }
  pre { white-space: pre-wrap; font: inherit; margin: 0; }
</style>
</head>
<body>
<header>
  <a href="/ui">Job Copilot <span class="muted">beta</span></a>
  <span class="nav">
    <a href="/ui/profile">Profile</a>
    <a href="/ui/new">New application</a>
  </span>
</header>
<main>
{% if not ai_real %}<div class="banner">AI provider: <strong>deterministic fake</strong> — outputs are template-assembled, not generated. Set <code>ANTHROPIC_API_KEY</code> and restart for real drafts.</div>{% endif %}
{% block content %}{% endblock %}
</main>
</body>
</html>
